services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      - ROI_API_KEY=${ROI_API_KEY:-demo-key-change-me}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5174}

  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
